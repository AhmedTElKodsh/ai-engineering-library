name: Curriculum Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  curriculum:
    runs-on: ubuntu-latest

    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install curriculum dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect learner curriculum tests
        run: python -m pytest --collect-only curriculum -q

      - name: Validate reviewer reference notes
        run: python scripts/validate_curriculum_references.py --strict

      - name: Validate curriculum quality contract
        run: python scripts/validate_curriculum_quality.py --strict

      - name: Compile Python sources
        run: python -m compileall -q curriculum scripts tests

      - name: Lint Python sources
        run: python -m ruff check curriculum scripts tests
