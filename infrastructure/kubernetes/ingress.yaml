apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-curriculum-ingress
  namespace: ai-curriculum-dev
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - curriculum.ai-eng.com
      secretName: curriculum-tls
  rules:
    - host: curriculum.ai-eng.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-curriculum-ingress-staging
  namespace: ai-curriculum-staging
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
    - hosts:
        - staging.curriculum.ai-eng.com
      secretName: curriculum-staging-tls
  rules:
    - host: staging.curriculum.ai-eng.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000