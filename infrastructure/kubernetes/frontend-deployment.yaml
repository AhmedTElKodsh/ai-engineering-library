apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-curriculum-frontend
  namespace: ai-curriculum-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-curriculum-frontend
  template:
    metadata:
      labels:
        app: ai-curriculum-frontend
    spec:
      containers:
        - name: frontend
          image: ai-curriculum-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: "http://backend-service:3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: ai-curriculum-dev
spec:
  selector:
    app: ai-curriculum-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP